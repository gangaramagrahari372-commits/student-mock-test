<!DOCTYPE html>
<html>
<head>
<title>Login / Create Account</title>

<style>

body{
font-family: Arial;
background:#f2f2f2;
text-align:center;
}

.container{
width:320px;
margin:80px auto;
padding:20px;
background:white;
border-radius:10px;
box-shadow:0 0 10px gray;
}

input{
width:90%;
padding:8px;
margin:8px;
}

button{
padding:10px 20px;
background:blue;
color:white;
border:none;
cursor:pointer;
}

#createBox{
display:none;
}

</style>

</head>

<body>

<!-- LOGIN PAGE -->

<div class="container" id="loginBox">

<h2>Login</h2>

<input type="text" id="loginUser" placeholder="Username"><br>
<input type="password" id="loginPass" placeholder="Password"><br>

<button onclick="login()">Login</button>

<p>Don't have account?</p>

<button onclick="showCreate()">Create Account</button>

</div>


<!-- CREATE ACCOUNT -->

<div class="container" id="createBox">

<h2>Create Account</h2>

<input type="text" id="newUser" placeholder="Username"><br>
<input type="password" id="newPass" placeholder="Password"><br>

<button onclick="create()">Create</button>

<p>Already have account?</p>

<button onclick="showLogin()">Login</button>

</div>


<script>

var username="";
var password="";

function showCreate(){
document.getElementById("loginBox").style.display="none";
document.getElementById("createBox").style.display="block";
}

function showLogin(){
document.getElementById("createBox").style.display="none";
document.getElementById("loginBox").style.display="block";
}

function create(){

username=document.getElementById("newUser").value;
password=document.getElementById("newPass").value;

alert("Account Created Successfully");

showLogin();

}

function login(){

var user=document.getElementById("loginUser").value;
var pass=document.getElementById("loginPass").value;

if(user==username && pass==password){

alert("Login Successful");

}else{

alert("Wrong Username or Password");

}

}

</script>

</body>
</html>
